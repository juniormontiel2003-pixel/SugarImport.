<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SugarImport | Login Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <script src="js/theme.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="login-box glass">
            <h2>Acceso al Sistema</h2>
            <p style="margin-bottom: 2rem; color: #94a3b8;">Verificación de Rol y Permisos (RBAC)</p>
            
            <div id="error-msg" class="error-msg"></div>

            <form id="loginForm">
                <div class="form-group text-left" style="text-align: left;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group text-left" style="text-align: left;">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Iniciar Sesión</button>
            </form>
            <br>
            <a href="/" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">Volver a la Tienda</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
